packages:
  - apps/*
  - packages/*

overrides:
  # 以下は「override を外すと自然解決が floor を下回る＝今も実際に引き上げている」もののみ残す。
  # floor 以上に自然到達するようになった override（vite / path-to-regexp / @tootallnate/once /
  # qs / esbuild / @grpc/grpc-js / js-yaml）は依存元が追従済みのため撤去した（解決値は不変）。
  # protobufjs <= 8.5.0: schema 由来の名前が runtime プロパティを shadow（CVE-2026-54269）/
  # binary decode の unknown fields 保持によるメモリ増幅（CVE-2026-54270）。8.6.0 で修正。
  # 直接の依存元（google-gax 等）は ^7.5.3 を要求し、override を外すと 7.6.4 に落ちるため維持。
  # 8.6.0-8.6.5: .proto option 解析の無限ループ DoS（GHSA-j3f2-48v5-ccww）/
  # Text Format map 解析での prototype 汚染（GHSA-jfj6-75fj-8934）。8.6.6 で修正。
  protobufjs: ">=8.6.6"
  # brace-expansion 5.x 系（minimatch@10 経由）の >=3.0.0 <5.0.7 に DoS（GHSA-3jxr-9vmj-r5cp、指数時間展開）。
  # minimatch@9 系が使う brace-expansion@2.x は対象範囲外のため巻き込まないよう ^5 のみ対象にする。
  "brace-expansion@^5": ">=5.0.7"
  # uuid: override を外すと transitive が 8.3.2（deprecated）に落ちる。11.x に統一して維持。
  uuid: ">=11.1.1"
  # ws < 8.21.0: 小さな fragment/data chunk によるメモリ枯渇 DoS（GHSA-96hv-2xvq-fx4p）。8.21.0 で修正。
  # override を外すと 7.5.11 が混在するため維持。
  ws: ">=8.21.0"
  # postcss: override を外すと 8.4.31 が混在する。8.5.10 以上に揃えて維持。
  postcss: ">=8.5.10"
  # better-auth(@better-auth/kysely-adapter) は kysely 0.28 系の DEFAULT_MIGRATION_LOCK_TABLE を要求するが
  # 0.29.x で削除されており、0.29.2 が解決されると認証ルートが ESM import で 500 になる。0.28 系にピン（SPR-156）。
  kysely: "0.28.17"

allowBuilds:
  esbuild: true
  lefthook: true
  protobufjs: true
  sharp: true

minimumReleaseAgeExclude:
  - '@typescript/native-preview-darwin-arm64@7.0.0-dev.20260609.1'
  - '@typescript/native-preview-darwin-x64@7.0.0-dev.20260609.1'
  - '@typescript/native-preview-linux-arm64@7.0.0-dev.20260609.1'
  - '@typescript/native-preview-linux-arm@7.0.0-dev.20260609.1'
  - '@typescript/native-preview-linux-x64@7.0.0-dev.20260609.1'
  - '@typescript/native-preview-win32-arm64@7.0.0-dev.20260609.1'
  - '@typescript/native-preview-win32-x64@7.0.0-dev.20260609.1'
  - '@typescript/native-preview@7.0.0-dev.20260609.1'
