packages:
  - apps/*
  - packages/*

overrides:
  # protobufjs <= 8.5.0: schema 由来の名前が runtime プロパティを shadow（CVE-2026-54269）/
  # binary decode の unknown fields 保持によるメモリ増幅（CVE-2026-54270）。8.6.0 で修正。
  # 直接の依存元（google-gax 等）は ^7.5.3 を要求するが override で 8.x に引き上げる。
  protobufjs: ">=8.6.0"
  vite: ">=7.3.2"
  path-to-regexp: ">=8.4.0"
  uuid: ">=11.1.1"
  ws: ">=8.20.1"
  "@tootallnate/once": ">=2.0.1"
  postcss: ">=8.5.10"
  qs: ">=6.15.2"
  # esbuild < 0.28.1: バイナリ整合性未検証で RCE（GHSA-gv7w-rqvm-qjhr）・dev server 任意ファイル読み取り（GHSA-g7r4-m6w7-qqqr）
  esbuild: ">=0.28.1"
  # @grpc/grpc-js < 1.14.4: malformed request/圧縮メッセージでクラッシュ（CVE-2026-48068 / CVE-2026-48069）
  "@grpc/grpc-js": ">=1.14.4"
  # better-auth(@better-auth/kysely-adapter) は kysely 0.28 系の DEFAULT_MIGRATION_LOCK_TABLE を要求するが
  # 0.29.x で削除されており、0.29.2 が解決されると認証ルートが ESM import で 500 になる。0.28 系にピン（SPR-156）。
  kysely: "0.28.17"

allowBuilds:
  esbuild: true
  lefthook: true
  protobufjs: true
  sharp: true

minimumReleaseAgeExclude:
  - '@typescript/native-preview-darwin-arm64@7.0.0-dev.20260609.1'
  - '@typescript/native-preview-darwin-x64@7.0.0-dev.20260609.1'
  - '@typescript/native-preview-linux-arm64@7.0.0-dev.20260609.1'
  - '@typescript/native-preview-linux-arm@7.0.0-dev.20260609.1'
  - '@typescript/native-preview-linux-x64@7.0.0-dev.20260609.1'
  - '@typescript/native-preview-win32-arm64@7.0.0-dev.20260609.1'
  - '@typescript/native-preview-win32-x64@7.0.0-dev.20260609.1'
  - '@typescript/native-preview@7.0.0-dev.20260609.1'
