name: Dependency Update Verification

on:
  pull_request:
    paths: 
      - "package.json"
      - "pnpm-lock.yaml"
      - "apps/*/package.json"
      - "packages/*/package.json"

permissions:
  contents: read

jobs:
  dependency-check:
    name: Verify Dependency Updates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.13.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for dependency conflicts
        run: |
          echo "🔍 Checking for dependency conflicts..."
          pnpm ls --depth=0 || echo "Dependencies installed with warnings"

      - name: Security audit
        run: |
          echo "🔒 Running security audit..."
          pnpm audit --audit-level moderate

      # Detects when upstream radix-ui ships PR #3819 (./package.json export)
      # so the local pnpm patch can be removed. See pnpm-workspace.yaml +
      # patches/radix-ui@*.patch.
      - name: Check radix-ui patch obsolescence
        run: |
          echo "🩹 Checking if local radix-ui patch is still needed..."
          if pnpm view radix-ui@latest exports 2>/dev/null \
            | grep -q '"\./package\.json"'; then
            echo "::error::radix-ui upstream now exports './package.json' — local pnpm patch is OBSOLETE."
            echo "::error::Remove all of the following in this PR:"
            echo "::error::  1. patches/radix-ui@*.patch"
            echo "::error::  2. patchedDependencies entry in pnpm-workspace.yaml"
            echo "::error::  3. Bump radix-ui in packages/ui/package.json to the new version"
            exit 1
          fi
          echo "✅ radix-ui upstream still lacks './package.json' export — patch is still needed."

      - name: Check bundle size impact
        run: |
          echo "📦 Checking bundle size impact..."
          # shared-types は no-build（src を直接公開）のため事前ビルド不要

          # Build web app and check size
          cd apps/web
          pnpm build
          
          # Extract and display bundle size
          if [ -d ".next" ]; then
            echo "📊 Bundle size analysis:"
            find .next -name "*.js" -type f | xargs du -ch | grep total$ || echo "Unable to calculate bundle size"
          fi

      - name: Report dependency changes
        run: |
          echo "## 📊 Dependency Change Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Changed Files:" >> $GITHUB_STEP_SUMMARY
          git diff --name-only origin/${{ github.base_ref }}..HEAD | grep -E "(package\.json|pnpm-lock\.yaml)" | while read file; do
            echo "- \`$file\`" >> $GITHUB_STEP_SUMMARY
          done || echo "No package files changed" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Dependency Changes:" >> $GITHUB_STEP_SUMMARY
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          git diff origin/${{ github.base_ref }}..HEAD -- "**/package.json" | grep -E "^[+-]\s+\".*\":" | head -20 >> $GITHUB_STEP_SUMMARY || echo "No dependency changes detected" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

