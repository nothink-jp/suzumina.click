name: PR Check

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  
  # Manual triggering for testing
  workflow_dispatch:

# Cancel in-progress runs for the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.changes.outputs.web }}
      functions: ${{ steps.changes.outputs.functions }}
      shared-types: ${{ steps.changes.outputs.shared-types }}
      ui: ${{ steps.changes.outputs.ui }}
      typescript-config: ${{ steps.changes.outputs.typescript-config }}
      workflows: ${{ steps.changes.outputs.workflows }}
      dependencies: ${{ steps.changes.outputs.dependencies }}
      docker: ${{ steps.changes.outputs.docker }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            web:
              - 'apps/web/**'
            functions:
              - 'apps/functions/**'
            shared-types:
              - 'packages/shared-types/**'
            ui:
              - 'packages/ui/**'
            typescript-config:
              - 'packages/typescript-config/**'
            workflows:
              - '.github/workflows/**'
            dependencies:
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
            docker:
              - 'apps/web/Dockerfile'
              - 'apps/web/.dockerignore'
              - '.dockerignore'
              - 'apps/web/package.json'
              - 'packages/shared-types/package.json'
              - 'packages/ui/package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - '.github/workflows/pr-check.yml'

  parallel-check:
    name: Parallel Quality Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.functions == 'true' || needs.changes.outputs.shared-types == 'true' || needs.changes.outputs.ui == 'true'
    timeout-minutes: 8
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.16.0'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      # shared-types / ui は no-build（src を直接公開）のため事前ビルド不要。
      # 変更されたパッケージごとに lint / typecheck / test を並列実行する。
      # shared-types / ui はモノレポ全体の型の土台なので、変更時は依存先
      # （web / functions）の typecheck も走らせて破壊的変更を検出する。
      - name: Run all quality checks in parallel
        env:
          WEB: ${{ needs.changes.outputs.web }}
          FUNCTIONS: ${{ needs.changes.outputs.functions }}
          SHARED_TYPES: ${{ needs.changes.outputs.shared-types }}
          UI: ${{ needs.changes.outputs.ui }}
        run: |
          # 各チェックは `pnpm ... | sed` のパイプで実行する。pipefail がないと
          # pnpm 側の失敗が末尾の sed の終了コード 0 にマスクされて緑になるため、
          # GitHub Actions のデフォルトと同じく明示的に有効化する。
          set -eo pipefail
          echo "🧪 Running quality checks in parallel..."

          declare -A checks

          # <label> のチェックをバックグラウンドで起動し、PID を記録する。
          run_check() {
            local label="$1"; shift
            "$@" 2>&1 | sed "s/^/[$label] /" &
            checks["$label"]=$!
          }

          # --- web ---------------------------------------------------------
          # web 変更時は web 自身を検査。web 未変更でも依存（shared-types / ui）が
          # 変わったら typecheck だけ走らせ、破壊的変更を検出する。
          if [[ "$WEB" == "true" ]]; then
            run_check web-lint      pnpm --filter @suzumina.click/web lint
            run_check web-typecheck pnpm --filter @suzumina.click/web typecheck
            run_check web-test      pnpm --filter @suzumina.click/web test --run --passWithNoTests
          elif [[ "$SHARED_TYPES" == "true" || "$UI" == "true" ]]; then
            run_check web-typecheck pnpm --filter @suzumina.click/web typecheck
          fi

          # --- shared-types ------------------------------------------------
          if [[ "$SHARED_TYPES" == "true" ]]; then
            run_check shared-types-lint      pnpm --filter @suzumina.click/shared-types lint
            run_check shared-types-typecheck pnpm --filter @suzumina.click/shared-types typecheck
            run_check shared-types-test      pnpm --filter @suzumina.click/shared-types test
          fi

          # --- ui ----------------------------------------------------------
          if [[ "$UI" == "true" ]]; then
            run_check ui-lint      pnpm --filter @suzumina.click/ui lint
            run_check ui-typecheck pnpm --filter @suzumina.click/ui typecheck
            run_check ui-test      pnpm --filter @suzumina.click/ui test
          fi

          # --- functions ---------------------------------------------------
          # functions は esbuild バンドルのため build を fail-fast ゲートにし、
          # 成功後に lint / typecheck / test を並列起動する。functions 未変更でも
          # shared-types が変わったら typecheck だけ走らせる（build 非依存）。
          if [[ "$FUNCTIONS" == "true" ]]; then
            if pnpm --filter @suzumina.click/functions build 2>&1 | sed 's/^/[functions-build] /'; then
              echo "✅ functions-build completed"
              run_check functions-lint      pnpm --filter @suzumina.click/functions lint
              run_check functions-typecheck pnpm --filter @suzumina.click/functions typecheck
              run_check functions-test      pnpm --filter @suzumina.click/functions test --run
            else
              echo "❌ functions-build failed"
              exit 1
            fi
          elif [[ "$SHARED_TYPES" == "true" ]]; then
            run_check functions-typecheck pnpm --filter @suzumina.click/functions typecheck
          fi

          # --- 全チェックの完了を待ち、ひとつでも失敗したらジョブを fail させる ---
          # 1 件も選ばれなければ「無検査で緑」になるので、ここで明示的に落とす。
          if [[ ${#checks[@]} -eq 0 ]]; then
            echo "⚠️ No quality checks were selected for the changed files"
            exit 1
          fi

          failed=false
          for label in "${!checks[@]}"; do
            if wait "${checks[$label]}"; then
              echo "✅ $label completed"
            else
              echo "❌ $label failed"
              failed=true
            fi
          done

          if $failed; then
            echo "❌ Some checks failed"
            exit 1
          fi
          echo "🎉 All checks completed successfully"

  build-check:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [changes, parallel-check]
    if: always() && !failure() && !cancelled()
    timeout-minutes: 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.16.0'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Verify builds
        run: |
          echo "🏗️ Verifying production builds..."

          # shared-types は no-build のため事前ビルド不要
          # Build affected apps
          if [[ "${{ needs.changes.outputs.web }}" == "true" ]]; then
            echo "Building web app..."
            pnpm --filter @suzumina.click/web build
          fi

          echo "✅ All builds verified successfully"

  docker-build-check:
    name: Docker Build Check (web)
    runs-on: ubuntu-latest
    needs: changes
    # Dockerfile・docker build に効く依存・ワークフロー自身が変わった PR のみ実行
    # アプリコードのみの変更は Build Verification の pnpm build で検証済み、
    # 本番 Dockerfile は main マージ後の deploy-web.yml で改めてビルドされるため、
    # PR で毎回フルビルドする必要はない
    if: needs.changes.outputs.docker == 'true'
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # push せず build のみ。cache の export は行わない
      # （GHA cache へのアップロードがジョブ時間の 60% を占めていたため）
      # cache は deploy-web.yml が registry に維持するため PR 側で書き戻す必要がない
      - name: Build web image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          load: false
          tags: suzumina-web:pr-${{ github.event.pull_request.number }}
          platforms: linux/amd64

  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.title, 'deps') || contains(github.event.pull_request.title, 'security') || contains(github.event.pull_request.labels.*.name, 'security')
    timeout-minutes: 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.16.0'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Security audit
        run: pnpm audit --audit-level moderate

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    # シークレットはどのファイルにも混入しうるため、パスフィルタなしで全 PR を対象にする
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.16.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 検出時は非ゼロ終了で PR を fail させる（hard gate）
      - name: Run secretlint
        run: pnpm secretlint

  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [changes, parallel-check, build-check, docker-build-check, security-check, secret-scan]
    if: always()
    
    steps:
      - name: Generate PR summary
        run: |
          echo "## 🔍 PR Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 📁 Changed Components" >> $GITHUB_STEP_SUMMARY
          echo "- Web App: ${{ needs.changes.outputs.web == 'true' && '✅' || '⏭️' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Functions: ${{ needs.changes.outputs.functions == 'true' && '✅' || '⏭️' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Shared Types: ${{ needs.changes.outputs.shared-types == 'true' && '✅' || '⏭️' }}" >> $GITHUB_STEP_SUMMARY
          echo "- UI Package: ${{ needs.changes.outputs.ui == 'true' && '✅' || '⏭️' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 🧪 Quality Checks" >> $GITHUB_STEP_SUMMARY
          echo "- Parallel Check: ${{ needs.parallel-check.result == 'success' && '✅ Passed' || needs.parallel-check.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build Verification: ${{ needs.build-check.result == 'success' && '✅ Passed' || needs.build-check.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Docker Build (web): ${{ needs.docker-build-check.result == 'success' && '✅ Passed' || needs.docker-build-check.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Check: ${{ needs.security-check.result == 'success' && '✅ Passed' || needs.security-check.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Secret Scan: ${{ needs.secret-scan.result == 'success' && '✅ Passed' || needs.secret-scan.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 💡 Optimization Benefits" >> $GITHUB_STEP_SUMMARY
          echo "- ⚡ Only changed components tested" >> $GITHUB_STEP_SUMMARY
          echo "- 🚀 Parallel execution for all checks" >> $GITHUB_STEP_SUMMARY
          echo "- ⏱️  ~70% faster with parallel runs" >> $GITHUB_STEP_SUMMARY
          echo "- 💰 Significant cost reduction" >> $GITHUB_STEP_SUMMARY
          echo "- 🎯 Early feedback for developers" >> $GITHUB_STEP_SUMMARY