name: Claude AI Review

# AI レビュー（SPR-37）: Claude Code Action による PR 自動レビュー。CodeRabbit との A/B を経て本採用。
# 認証は Max サブスクリプション枠（OAuth トークン）。API 従量課金は使わない。
#   前提: ローカルで `claude setup-token` を実行し、出力を Secret `CLAUDE_CODE_OAUTH_TOKEN` に登録すること。
# 方針: 非ブロッキング（PR を fail させない・必須チェックにしない）。所見は PR コメント/行内コメントで可視化するだけ。
#   採否の最終判断は人=唯一のレビュアーが行う前提（CLAUDE.md §1 セルフマージ・ポリシー）。
#
# 重要: コメント投稿には公式 pr-review-comprehensive.yml 同様に track_progress: true と、
#   claude_args の --allowedTools での明示許可が必須（agent モード既定ではコメント用 MCP が起動せず投稿できない）。
#   また claude-code-action は workflow が main と同一になるまで実レビューをスキップする仕様のため、
#   この workflow の変更は main にマージするまで効かない。

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: read
  id-token: write # claude-code-action の OIDC ブートストラップに必須

jobs:
  claude-review:
    name: Claude review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # fork からの PR では OAuth Secret を渡さない（漏洩防止）。draft は対象外。
    # Dependabot（bot actor）は対象外: GitHub は pull_request イベントで bot 起因の workflow に
    # Actions Secrets を一切渡さない仕様のため、CLAUDE_CODE_OAUTH_TOKEN が未設定のまま実行され
    # 必ず失敗する（#840 で確認）。Dependabot PR は人間レビュー（セルフマージ・ポリシー）に委ねる。
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.draft == false && github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # advisory（非ブロッキング）なので失敗しても PR を赤くしない。
      # 特に「この workflow 自体を変更した PR」は validation 仕様でハードエラーになるが無害。
      # 注意: レビュー欠落（コメント未投稿）が失敗のサイン。緑＝必ずレビュー成功、ではない
      #   （このステップ自体は continue-on-error のため conclusion は常に success になる。
      #    実際の成否は後続の「Fail job if Claude review errored」ステップの outcome チェックで可視化する）。
      - name: Claude Code Review
        id: claude-review
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # 進捗トラッキングコメントを作成し、コメント投稿用ツールを有効化する（タグモード）。
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            あなたはこのリポジトリの PR レビュアーです。リポジトリ直下の CLAUDE.md が「能動ルールの単一ソース」です。
            必ず CLAUDE.md を読み、その §0 の評価軸と §1 の能動ルールに沿ってレビューしてください。

            # 出力言語
            すべて日本語で書く（技術用語は原語のまま）。

            # 最優先で見る観点（CLAUDE.md §0 の評価軸）
            - 軸3（最優先）: 名前・型の約束と実際の振る舞いのズレ。get/find 系の隠れた副作用、責務の広狭、
              Firestore コレクション名の混同（正本は `works`）、正本が曖昧な箇所。
            - 軸2: 命名と挙動の予測可能性。新しい変換層・抽象の追加は原則指摘（Entity/PlainObject 変換層は尊重）。
            - 軸1: 系の劣化。非正規化の追加（整合性 cron `checkDataIntegrity` の保守負債を増やす）、版ズレ。
            - §1 の能動ルール違反: pnpm 以外/npm 混入、テスト配置（__tests__ 外）、shared-types を使わない型定義、
              不要コメント、自動生成ドキュメント、Entity 化ゲート未通過の新規 Entity。

            # セルフマージ・ポリシー判定（このリポジトリ用）
            レビュー冒頭に必ず「Door 判定」を 1 行で出す。基準は「容易にやり直せるか」。
            - **One-Way Door（人間レビュー必須・自己マージ非推奨）**: Firestore スキーマ/非正規化, 整合性 cron,
              better-auth/Discord 認証・認可, Terraform/GCP インフラ, .github/workflows（CI/CD）, packages/shared-types
              の破壊的変更, 新規 Entity 追加。これらを含むなら「⚠️ One-Way Door: 人間レビュー必須」と明示。
            - **Two-Way Door（AI レビューのみで自己マージ可の候補）**: 上記に該当せず、戻せる UI/表示/軽微なロジック変更。
              「✅ Two-Way Door: 重大所見が無ければ自己マージ可」と明示。

            # 所見の出し方
            - 具体的な行に対しては inline review comment（mcp__github_inline_comment__create_inline_comment）で指摘する。
            - 全体所見はトップレベルコメントにまとめ、重大度（blocker / major / minor / nit）を付ける。
            - 確信が持てない指摘は「要確認」と明示し、断定しない（ノイズを最小化）。
            - 問題が無ければ「重大所見なし」とはっきり書く。
          # モデルは固定しない（版ズレ回避: CLAUDE.md 軸1）。action 既定の最新モデルに任せる。
          # 行内コメント投稿ツールと gh コマンドを明示許可（これが無いと投稿できない）。
          # git diff / git status: claude-code-action 組み込みシステムプロンプトが PR 差分確認に
          #   `git diff origin/main...HEAD` / `git status` を使うよう明示的に指示してくる。これを
          #   allowedTools から漏らすと毎回 permission denied → 再試行のループでターンを空費し、
          #   「コンテキスト取得」段階のまま max-turns で強制終了する（run 29632314677 で確認・PR #810）。
          # max-turns 40: CLI 更新で既定モデルが変わるとターン消費が増える（sonnet-4-6→5 で 5-15→21+ に増加し
          #   20 では枯渇＝レビュー未投稿。run 28672455307）。モデル非固定の方針を維持するため余裕を持たせる。
          claude_args: |
            --max-turns 40
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git diff:*),Bash(git status:*)"

      # continue-on-error でこのステップ自体は success 扱いになるため、レビューが
      # error_max_turns 等で未完了に終わった場合は job を明示的に fail させて可視化する
      # （「重大所見なし」で通ったのか「レビューが実行できなかった」のかを gh pr checks で区別するため）。
      # 必須チェックには設定しない方針（CLAUDE.md §1）なので、この fail は merge をブロックしない。
      - name: Fail job if Claude review errored
        if: steps.claude-review.outcome == 'failure'
        run: |
          echo "::error::Claude Code Review step failed (outcome=failure). This means the AI review did NOT complete — it is NOT the same as 'reviewed, no findings'. See the Claude Code Review step log above for details."
          exit 1
