name: Deploy Web

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'packages/shared-types/**'
      - 'packages/ui/**'
      - '.github/workflows/deploy-web.yml'
  
  # Manual triggering
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-northeast1
  SERVICE_NAME: suzumina-click-web
  REPOSITORY: suzumina-click-web
  IMAGE_NAME: web

jobs:
  check-pr-status:
    name: Check PR Status
    runs-on: ubuntu-latest
    outputs:
      skip-checks: ${{ steps.check.outputs.skip-checks }}
    steps:
      - name: Check if from merged PR
        id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # PRマージによるコミットの場合、すでにPRチェックで検証済み
          # 最初の行だけを取得して判定（複数行メッセージ対応）
          # env 経由で受け取ることで script injection を防止
          COMMIT_FIRST_LINE=$(printf '%s' "$COMMIT_MSG" | head -n1)
          echo "Commit message: $COMMIT_FIRST_LINE"

          if [[ "$COMMIT_FIRST_LINE" =~ ^Merge\ pull\ request ]] || [[ "$COMMIT_FIRST_LINE" =~ \(#[0-9]+\)$ ]]; then
            echo "skip-checks=true" >> "$GITHUB_OUTPUT"
            echo "✅ PR already validated, skipping redundant checks"
          else
            echo "skip-checks=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Direct push detected, full checks required"
          fi

  pre-deploy-checks:
    name: Pre-deploy Checks
    runs-on: ubuntu-latest
    needs: check-pr-status
    if: needs.check-pr-status.outputs.skip-checks == 'false'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.17.0'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Quick validation
        run: |
          echo "🧪 Running quick validation for direct push..."

          # shared-types は no-build（src を直接公開）のため事前ビルド不要
          # Run critical checks in parallel
          pnpm --filter @suzumina.click/web typecheck &
          TYPECHECK_PID=$!
          
          pnpm --filter @suzumina.click/web test:critical --run &
          TEST_PID=$!
          
          # Wait for results
          if wait $TYPECHECK_PID; then
            echo "✅ TypeScript check passed"
          else
            echo "❌ TypeScript check failed"
            exit 1
          fi
          
          if wait $TEST_PID; then
            echo "✅ Critical tests passed"
          else
            echo "❌ Critical tests failed"
            exit 1
          fi

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [check-pr-status, pre-deploy-checks]
    if: always() && !failure() && !cancelled()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      
      # Google Cloud authentication - 早期に実行
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: 'projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com'
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
      
      - name: Configure Docker
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev
      
      # Set up Docker Buildx with advanced caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=moby/buildkit:v0.23.2
            network=host
      
      # Build and push using docker/build-push-action for better performance
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          # SPR-219: attestation を無効化。これが AR cleanup policy の効かない oci.image.index 構造を生み、
          # untagged マニフェスト蓄積の根本原因だった（Cloud Run デプロイに attestation は不要）。
          provenance: false
          sbom: false
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest
          # SPR-219: build cache を AR registry → gha へ（AR 肥大回避）。
          # mode=min は GHA 10GB 共有プール（CI の pnpm cache で逼迫）への影響を抑えるため（max は CI cache を退避させる）。
          # BUILDKIT_INLINE_CACHE=1 は registry cache 前提のため撤去。
          cache-from: |
            type=gha
          cache-to: |
            type=gha,mode=min,ignore-error=true
          platforms: linux/amd64
      
      # Deploy to Cloud Run
      - name: Deploy to Cloud Run
        run: |
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          
          echo "🚀 Deploying to Cloud Run..."
          
          # Deploy and let Cloud Run handle traffic migration automatically
          # spec（cpu/memory/min-max-instances/timeout/port/cpu-throttling）と invoker（--allow-unauthenticated）は
          # Terraform が正本（cloud_run.tf）。ADR-009/SPR-97 に基づき deploy からは外し、二重管理を解消する。
          # gcloud run deploy は update セマンティクスで、指定しないフラグは既存 revision の値を保持するため、
          # ここでは image / env / secret のみ更新する（spec は terraform apply 時のみ変更）。
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image $IMAGE_TAG \
            --region ${{ env.REGION }} \
            --platform managed \
            --service-account="cloud-run-nextjs@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
            --set-env-vars="NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1,GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }},BETTER_AUTH_URL=https://suzumina.click,NEXT_PUBLIC_GA_MEASUREMENT_ID=G-9SYZ48LBPH,NEXT_PUBLIC_GTM_ID=GTM-W7QT5PCR" \
            --set-secrets="DISCORD_CLIENT_ID=DISCORD_CLIENT_ID:latest,DISCORD_CLIENT_SECRET=DISCORD_CLIENT_SECRET:latest,BETTER_AUTH_SECRET=BETTER_AUTH_SECRET:latest,YOUTUBE_API_KEY=YOUTUBE_API_KEY:latest,RESEND_API_KEY=RESEND_API_KEY:latest,CONTACT_EMAIL_RECIPIENTS=CONTACT_EMAIL_RECIPIENTS:latest"
          
          echo "✅ Deployment completed successfully"
      
      # Verify deployment
      - name: Verify deployment
        run: |
          # Get service URL
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          
          echo "📍 Service URL: $SERVICE_URL"
          
          # Simple health check after deployment
          echo "🔍 Performing health check..."
          sleep 10  # Give the service a moment to stabilize
          
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${SERVICE_URL}/api/health" || echo "000")
          
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Health check passed (HTTP $HTTP_STATUS)"
            echo "🎉 Deployment verified successfully!"
          else
            echo "⚠️ Health check returned HTTP $HTTP_STATUS"
            echo "Note: The deployment may still be successful. Check Cloud Run logs if needed."
          fi
      
      # Cloud Run リビジョンの掃除
      # image GC は terraform の cleanup_policies が正本（ADR-009 原則3 / SPR-96）。
      # リビジョン GC は terraform ネイティブ手段が無いためここに残す（二重管理ではない）。
      - name: Cleanup old revisions
        if: always()
        run: |
          echo "🧹 Cleaning up old Cloud Run revisions..."

          REVISIONS=$(gcloud run revisions list \
            --service="${{ env.SERVICE_NAME }}" \
            --region="${{ env.REGION }}" \
            --sort-by="~metadata.creationTimestamp" \
            --format="value(metadata.name)" \
            --limit=10)

          if [ -n "$REVISIONS" ]; then
            REVISION_ARRAY=($REVISIONS)
            TOTAL=${#REVISION_ARRAY[@]}

            if [ $TOTAL -gt 3 ]; then
              echo "Cleaning up $((TOTAL-3)) old revisions..."
              for ((i=3; i<TOTAL; i++)); do
                gcloud run revisions delete "${REVISION_ARRAY[$i]}" \
                  --region="${{ env.REGION }}" \
                  --quiet || true
              done
            fi
          fi

          echo "✅ Revision cleanup completed"

      # Artifact Registry イメージバージョンの掃除
      # SPR-247: terraform cleanup_policies（artifact_registry.tf）は "web" パッケージで実効性なしと
      # SPR-220 の再観測で確定した（clean manifest 化後も削除適格な版が10日超残存）。
      # GCP側のpolicy評価に依存せず、ここでdigest単位のGCを自前実行する。
      # ロジックは既存policyのセマンティクスを踏襲: keep-recent-versions(5) / keep latest tag / delete older than 7日。
      # AR_CLEANUP_DRY_RUN=true の間は削除せずログ出力のみ。初回デプロイ（PR #799マージ直後・
      # run 29622987957）のdry-run結果で削除候補32版がベースライン調査と完全一致することを確認済みのため、
      # ここから実削除を有効化する。
      - name: Cleanup old Artifact Registry image versions
        if: always()
        env:
          AR_CLEANUP_DRY_RUN: 'false'
        run: |
          echo "🧹 Cleaning up old Artifact Registry image versions (dry_run=${AR_CLEANUP_DRY_RUN})..."

          KEEP_COUNT=5
          CUTOFF_EPOCH=$(date -u -d '7 days ago' +%s)

          IMAGE_PATH="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}"

          # latestタグが指す版のdigest（keep-minimum-versions相当）
          LATEST_DIGEST=$(gcloud artifacts docker images describe "${IMAGE_PATH}:latest" \
            --format="value(image_summary.digest)" 2>/dev/null || true)

          # デプロイ自体は既に成功済みのため、一時的なAPIエラーでこのステップ（延いてはjob）を
          # 失敗扱いにしない。list失敗時はスキップしてexit 0する（削除失敗時の `|| true` と同様の考え方）。
          if ! ALL_VERSIONS=$(gcloud artifacts versions list \
            --package="${{ env.IMAGE_NAME }}" \
            --repository="${{ env.REPOSITORY }}" \
            --location="${{ env.REGION }}" \
            --sort-by="~createTime" \
            --format="csv[no-heading](name.basename(),createTime)" 2>&1); then
            echo "⚠️ Failed to list Artifact Registry versions (transient API error?), skipping cleanup this run"
            echo "$ALL_VERSIONS"
            exit 0
          fi

          if [ -z "$ALL_VERSIONS" ]; then
            echo "No versions found, skipping"
            exit 0
          fi

          INDEX=0
          PROCESSED=0
          while IFS=',' read -r DIGEST CREATE_TIME; do
            [ -z "$DIGEST" ] && continue
            INDEX=$((INDEX + 1))

            # keep-recent-versions: 直近5版は経過日数に関係なく保持
            if [ "$INDEX" -le "$KEEP_COUNT" ]; then
              continue
            fi

            # keep-minimum-versions: latestタグが指す版は保持
            if [ -n "$LATEST_DIGEST" ] && [ "$DIGEST" = "$LATEST_DIGEST" ]; then
              continue
            fi

            # delete-old: 7日より古い版のみ削除対象
            CREATE_EPOCH=$(date -u -d "$CREATE_TIME" +%s 2>/dev/null || echo 0)
            if [ "$CREATE_EPOCH" -eq 0 ] || [ "$CREATE_EPOCH" -ge "$CUTOFF_EPOCH" ]; then
              continue
            fi

            if [ "$AR_CLEANUP_DRY_RUN" = "true" ]; then
              echo "[dry-run] Would delete: $DIGEST (created $CREATE_TIME)"
            else
              echo "Deleting old version: $DIGEST (created $CREATE_TIME)"
              # 各版はbuild時に commit-sha タグが必ず付くため（このwhileループの時点で
              # latestタグの版は既に除外済み）、そのタグ削除も併せて行う --delete-tags が必須。
              # 無指定だと "Cannot delete version ... because it is tagged" (code 9) で全件失敗する
              # （2026-07-18 本番実測で確認）。
              gcloud artifacts versions delete "$DIGEST" \
                --package="${{ env.IMAGE_NAME }}" \
                --repository="${{ env.REPOSITORY }}" \
                --location="${{ env.REGION }}" \
                --delete-tags \
                --quiet || echo "  ⚠️ Failed to delete $DIGEST"
            fi
            PROCESSED=$((PROCESSED + 1))
          done <<< "$ALL_VERSIONS"

          echo "✅ Processed $PROCESSED old Artifact Registry version(s) (dry_run=${AR_CLEANUP_DRY_RUN})"
