name: Deploy Functions

on:
  push:
    branches:
      - main
    paths:
      - 'apps/functions/**'
      - 'packages/shared-types/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  check-pr-status:
    name: Check PR Status
    runs-on: ubuntu-latest
    outputs:
      skip-checks: ${{ steps.check.outputs.skip-checks }}
    steps:
      - name: Check if from merged PR
        id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # PRマージによるコミットの場合、すでにPRチェックで検証済み
          # 最初の行だけを取得して判定（複数行メッセージ対応）
          # env 経由で受け取ることで script injection を防止
          COMMIT_FIRST_LINE=$(printf '%s' "$COMMIT_MSG" | head -n1)
          echo "Commit message: $COMMIT_FIRST_LINE"

          if [[ "$COMMIT_FIRST_LINE" =~ ^Merge\ pull\ request ]] || [[ "$COMMIT_FIRST_LINE" =~ \(#[0-9]+\)$ ]]; then
            echo "skip-checks=true" >> "$GITHUB_OUTPUT"
            echo "✅ PR already validated, skipping redundant checks"
          else
            echo "skip-checks=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Direct push detected, full checks required"
          fi

  pre-deploy-checks:
    name: Pre-deploy Checks
    runs-on: ubuntu-latest
    needs: check-pr-status
    if: needs.check-pr-status.outputs.skip-checks == 'false'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.16.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Quick validation
        run: |
          echo "🧪 Running quick validation for direct push..."

          # esbuild bundle (shared-types は src から直接 inline されるので別途 build 不要)
          pnpm --filter=@suzumina.click/functions build
          echo "✅ Build completed"

          # Run critical tests
          NODE_ENV=test pnpm --filter=@suzumina.click/functions test --bail 1
          echo "✅ Critical tests passed"

  deploy:
    name: Deploy Functions
    runs-on: ubuntu-latest
    needs: [check-pr-status, pre-deploy-checks]
    if: always() && !failure() && !cancelled()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.16.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build functions (esbuild bundle)
        run: |
          echo "🔨 Building Cloud Functions bundle..."
          pnpm --filter=@suzumina.click/functions build

      - name: Authenticate to GCP
        id: 'auth'
        uses: 'google-github-actions/auth@v3'
        with:
          workload_identity_provider: 'projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'cloud-functions-deployer-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com'

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Create deployment bundle
        run: |
          # esbuild 後のバンドル lib/index.js と縮小 package.json のみをデプロイ
          mkdir -p ./deployment-temp
          cp -r apps/functions/lib ./deployment-temp/
          cp apps/functions/package.json ./deployment-temp/

          # workspace 依存（shared-types）を削除し、dev フィールドも除去
          cd ./deployment-temp
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));

            // shared-types は esbuild で inline 済み → ランタイム依存から削除
            if (pkg.dependencies) {
              delete pkg.dependencies['@suzumina.click/shared-types'];
            }

            // 開発用スクリプト・devDependencies を削除
            delete pkg.scripts;
            delete pkg.devDependencies;

            // main は esbuild バンドルの単一ファイルを指す
            pkg.main = 'lib/index.js';

            // enginesフィールドを確実に設定
            pkg.engines = pkg.engines || {};
            pkg.engines.node = '24';

            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

          # 本番依存をインストール（workspace 依存がなくなったので標準フロー）
          pnpm install --prod --no-frozen-lockfile

          # デプロイ用のzipファイルを作成
          zip -r ../functions-deployment.zip *
          cd ..

          echo "Deployment bundle created: functions-deployment.zip"
          ls -lh ../functions-deployment.zip 2>/dev/null || ls -lh functions-deployment.zip

      - name: Upload to Cloud Storage
        run: |
          # デプロイ用のCloud Storageバケット名を設定
          BUCKET_NAME="${{ secrets.GCP_PROJECT_ID }}-functions-deployment"
          
          # バケットが存在するかチェック
          if ! gsutil ls gs://$BUCKET_NAME/ &>/dev/null; then
            echo "❌ Error: Deployment bucket does not exist: gs://$BUCKET_NAME"
            exit 1
          else
            echo "✅ Deployment bucket exists: $BUCKET_NAME"
          fi
          
          # アーカイブをアップロード
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          ARCHIVE_NAME="functions-${TIMESTAMP}.zip"
          
          echo "📤 Uploading deployment archive..."
          gsutil cp functions-deployment.zip gs://$BUCKET_NAME/$ARCHIVE_NAME
          echo "✅ Uploaded: gs://$BUCKET_NAME/$ARCHIVE_NAME"
          
          # 環境変数として保存（BUCKET_NAME の export は zip 手動 GC 撤去で不要化＝SPR-96）
          echo "DEPLOYMENT_SOURCE=gs://$BUCKET_NAME/$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Deploy functions in parallel
        run: |
          echo "🚀 Deploying functions in parallel..."
          
          # 各関数のデプロイを並列実行
          declare -A deploy_pids
          
          # fetchYouTubeVideos
          gcloud functions deploy fetchYouTubeVideos \
            --gen2 \
            --source ${{ env.DEPLOYMENT_SOURCE }} \
            --runtime nodejs24 \
            --entry-point fetchYouTubeVideos \
            --trigger-topic youtube-video-fetch-trigger \
            --region asia-northeast1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --set-env-vars NODE_ENV=production,FUNCTION_SIGNATURE_TYPE=cloudevent,FUNCTION_TARGET=fetchYouTubeVideos \
            --memory 256Mi \
            --timeout 540s \
            --max-instances 3 \
            --service-account fetch-youtube-videos-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --quiet &
          deploy_pids["fetchYouTubeVideos"]=$!
          
          # fetchDLsiteUnifiedData
          gcloud functions deploy fetchDLsiteUnifiedData \
            --gen2 \
            --source ${{ env.DEPLOYMENT_SOURCE }} \
            --runtime nodejs24 \
            --entry-point fetchDLsiteUnifiedData \
            --trigger-topic dlsite-individual-api-trigger \
            --region asia-northeast1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --set-env-vars NODE_ENV=production,FUNCTION_SIGNATURE_TYPE=cloudevent,FUNCTION_TARGET=fetchDLsiteUnifiedData,INDIVIDUAL_INFO_API_ENABLED=true,API_ONLY_MODE=true,MAX_CONCURRENT_API_REQUESTS=5,API_REQUEST_DELAY_MS=500,ENABLE_DATA_VALIDATION=true,MINIMUM_QUALITY_SCORE=80,ENABLE_TIMESERIES_INTEGRATION=true,LOG_LEVEL=info \
            --memory 512Mi \
            --timeout 300s \
            --max-instances 1 \
            --service-account fetch-dlsite-individual-api-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --quiet &
          deploy_pids["fetchDLsiteUnifiedData"]=$!
          
          # checkDataIntegrity
          gcloud functions deploy checkDataIntegrity \
            --gen2 \
            --source ${{ env.DEPLOYMENT_SOURCE }} \
            --runtime nodejs24 \
            --entry-point checkDataIntegrity \
            --trigger-topic data-integrity-check-trigger \
            --region asia-northeast1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --set-env-vars NODE_ENV=production,FUNCTION_SIGNATURE_TYPE=cloudevent,FUNCTION_TARGET=checkDataIntegrity \
            --memory 512Mi \
            --timeout 540s \
            --max-instances 1 \
            --service-account data-integrity-check-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --ingress-settings internal-only \
            --quiet &
          deploy_pids["checkDataIntegrity"]=$!
          
          # 全デプロイの完了を待つ
          failed=false
          for func_name in "${!deploy_pids[@]}"; do
            if wait ${deploy_pids[$func_name]}; then
              echo "✅ $func_name deployed successfully"
            else
              echo "❌ $func_name deployment failed"
              failed=true
            fi
          done
          
          if $failed; then
            echo "❌ Some deployments failed"
            exit 1
          else
            echo "🎉 All functions deployed successfully"
          fi

      - name: Cleanup
        if: always()
        run: |
          # 一時ファイルを削除
          rm -rf ./deployment-temp
          rm -f functions-deployment.zip

          # デプロイ用 zip の GC は bucket lifecycle（30日, storage.tf）が正本（ADR-009 原則3 / SPR-96）。
          # 旧「最新5個保持」の手動削除は二重管理のため撤去した。

          # Cloud Functions リビジョンのクリーンアップ
          echo "🧹 Cleaning up old Cloud Functions revisions..."
          
          FUNCTIONS=("fetchyoutubevideos" "fetchdlsiteunifieddata" "checkdataintegrity")
          KEEP_COUNT=3
          
          for function_name in "${FUNCTIONS[@]}"; do
            echo "Processing function: $function_name"
            
            revisions=$(gcloud run revisions list \
              --service="$function_name" \
              --region="asia-northeast1" \
              --project="${{ secrets.GCP_PROJECT_ID }}" \
              --sort-by="~metadata.creationTimestamp" \
              --format="value(metadata.name)" \
              --limit=10)
            
            if [ -z "$revisions" ]; then
              continue
            fi
            
            revision_array=($revisions)
            total_count=${#revision_array[@]}
            
            if [ $total_count -le $KEEP_COUNT ]; then
              continue
            fi
            
            for ((i=KEEP_COUNT; i<total_count; i++)); do
              revision=${revision_array[$i]}
              echo "Deleting revision: $revision"
              gcloud run revisions delete "$revision" \
                --region="asia-northeast1" \
                --project="${{ secrets.GCP_PROJECT_ID }}" \
                --quiet || true
            done
          done || true

      - name: Deploy summary
        run: |
          echo "## 🚀 デプロイ結果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 デプロイされた関数" >> $GITHUB_STEP_SUMMARY
          echo "- **fetchYouTubeVideos**: ✅ デプロイ完了" >> $GITHUB_STEP_SUMMARY
          echo "- **fetchDLsiteUnifiedData**: ✅ デプロイ完了" >> $GITHUB_STEP_SUMMARY
          echo "- **checkDataIntegrity**: ✅ デプロイ完了" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🛡️ 最適化の改善点" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ PRマージ時の重複チェック回避" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 並列デプロイで高速化" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 自動クリーンアップ（最新3リビジョンを保持）" >> $GITHUB_STEP_SUMMARY