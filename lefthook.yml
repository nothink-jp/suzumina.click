# 最適化された開発フロー設定
# pre-commit: 自動修正のみ（開発速度重視）
# pre-push: 最小限の品質チェック（他開発者への影響防止）

pre-commit:
  commands:
    # 自動フォーマット（ブロッキングなし、即座の修正）
    format:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: npx @biomejs/biome check --write --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      stage_fixed: true
      fail_text: "コード整形に失敗しました"

    # シークレット混入チェック（検出時はコミットをブロック）
    # secretlint はデフォルトで引数を glob 解釈するため、実パス列には --no-glob が必須
    secretlint:
      run: npx secretlint --no-glob {staged_files}
      fail_text: "シークレットの混入を検出しました。コミットを中止します"

pre-push:
  parallel: true  # 並列実行で高速化
  commands:
    # 変更影響範囲の型チェック（tsgo = TypeScript ネイティブ版で高速化, SPR-11）
    # ローカルの高速ゲート。merge をブロックする正のゲートは CI 側の tsc（pnpm typecheck）が担保する
    # shared-types / ui は no-build（src 直接公開）のため事前ビルド不要
    typecheck-changed:
      glob: "*.{ts,tsx}"
      run: |
        set -e
        # push 対象ファイルが属するパッケージを特定して型チェック（重複排除）
        # `case` を $() 内に書くと sh(bash 互換) がパターンの ) を $( の閉じと誤認するため grep で抽出する
        pkgs=$(printf "%s\n" {push_files} | grep -E "^(apps|packages)/" | cut -d/ -f1-2 | sort -u)
        if [ -z "$pkgs" ]; then echo "型チェック対象のパッケージ変更なし"; exit 0; fi
        for pkg in $pkgs; do
          echo "▶ typecheck: $pkg"
          pnpm --filter "./$pkg" typecheck:fast
        done
      fail_text: "変更パッケージの型チェックに失敗しました"